<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Leludo brand mark · resume-card mini-board.
       2×2 colored home quadrants, dark 1/3-thick cross overlay,
       off-white centre diamond. Mirrors the resume-mini-board
       used on the home screen. -->
  <defs>
    <clipPath id="round"><rect width="96" height="96" rx="14"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect x="0"  y="0"  width="48" height="48" fill="#3D8A5E"/>
    <rect x="48" y="0"  width="48" height="48" fill="#D7A21F"/>
    <rect x="0"  y="48" width="48" height="48" fill="#3253A8"/>
    <rect x="48" y="48" width="48" height="48" fill="#C8472E"/>
    <rect x="0"  y="32" width="96" height="32" fill="#140F0A" fill-opacity="0.22"/>
    <rect x="32" y="0"  width="32" height="96" fill="#140F0A" fill-opacity="0.22"/>
    <rect x="-5.5" y="-5.5" width="11" height="11"
          transform="translate(48 48) rotate(45)"
          fill="#FAF6EC" fill-opacity="0.85"/>
  </g>
</svg>
