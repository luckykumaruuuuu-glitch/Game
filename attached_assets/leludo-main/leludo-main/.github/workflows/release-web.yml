name: Release (Web)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read VERSION from version.js
        id: read
        run: |
          VERSION=$(node -e "import('./version.js').then(m => process.stdout.write(m.VERSION))")
          if [ -z "$VERSION" ]; then
            echo "Failed to read VERSION from version.js" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected VERSION=$VERSION"

  test:
    name: Unit + integration tests
    needs: detect-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  build-web:
    name: Build web
    needs: [detect-version, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: npm run build:www

      - name: Zip web bundle
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          cd www
          zip -r "../ludo-web-v${VERSION}.zip" .

      - name: Upload web artifact
        uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: ludo-web-v*.zip
          if-no-files-found: error

  publish-pages:
    name: Publish to gh-pages
    needs: [detect-version, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: pages-deploy
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build www/
        run: node tools/build-www.mjs

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./www
          publish_branch: gh-pages
          # tools/build-www.mjs already copies CNAME + .nojekyll into
          # www/, so peaceiris doesn't need its `cname` / Jekyll flags.
          commit_message: "deploy: ${{ github.sha }}"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"

  release:
    name: Publish release (Web)
    needs: [detect-version, build-web, publish-pages]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download web artifact
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: dist/web-dist

      - name: Create tag if missing
        env:
          TAG: ${{ needs.detect-version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping create."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version.outputs.tag }}
          name: ${{ needs.detect-version.outputs.tag }}
          generate_release_notes: true
          body: |
            Full release notes: https://leludo.fun/changelog.html

            Artifacts:
            - `ludo-web-v${{ needs.detect-version.outputs.version }}.zip` — web bundle (Capacitor `www/` contents)
          files: |
            dist/web-dist/*.zip
