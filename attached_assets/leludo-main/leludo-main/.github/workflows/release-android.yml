name: Release (Android)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version:
    name: Detect version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.read.outputs.version }}
      tag: ${{ steps.read.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read VERSION from version.js
        id: read
        run: |
          VERSION=$(node -e "import('./version.js').then(m => process.stdout.write(m.VERSION))")
          if [ -z "$VERSION" ]; then
            echo "Failed to read VERSION from version.js" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected VERSION=$VERSION"

  test:
    name: Unit + integration tests
    needs: detect-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

  build-android:
    name: Build Android
    needs: [detect-version, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Install dependencies
        run: npm ci

      - name: Prepare Android (version sync + build:www + cap sync)
        run: npm run android:prepare

      - name: Write keystore + properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing" >&2
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat > android/keystore.properties <<EOF
          storeFile=app/release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build release APK + AAB
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease --no-daemon --build-cache

      - name: Rename outputs
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          mkdir -p android-out
          cp android/app/build/outputs/apk/release/app-release.apk "android-out/ludo-v${VERSION}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "android-out/ludo-v${VERSION}.aab"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v5
        with:
          name: android-dist
          path: android-out/*
          if-no-files-found: error

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f android/app/release.keystore android/keystore.properties

  publish-play-store:
    name: Publish to Google Play
    needs: [detect-version, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Download Android artifact
        uses: actions/download-artifact@v5
        with:
          name: android-dist
          path: android-dist

      - name: Generate Play Store release notes
        run: npm run whatsnew:extract

      - name: Upload AAB to Google Play (internal testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.leludo.ludo
          releaseFiles: android-dist/ludo-v${{ needs.detect-version.outputs.version }}.aab
          tracks: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew

  release:
    name: Publish release (Android)
    needs: [detect-version, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download Android artifact
        uses: actions/download-artifact@v5
        with:
          name: android-dist
          path: dist/android-dist

      - name: Create tag if missing
        env:
          TAG: ${{ needs.detect-version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping create."
          else
            git tag -a "$TAG" -m "Release $TAG"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.detect-version.outputs.tag }}
          name: ${{ needs.detect-version.outputs.tag }}
          generate_release_notes: true
          body: |
            Full release notes: https://leludo.fun/changelog.html

            Artifacts:
            - `ludo-v${{ needs.detect-version.outputs.version }}.apk` — sideloadable Android APK
            - `ludo-v${{ needs.detect-version.outputs.version }}.aab` — Play Store Android App Bundle
          files: |
            dist/android-dist/*.apk
            dist/android-dist/*.aab
